        if(w>h){if(w>mx){h=Math.round(h*(mx/w));w=mx;}}else{if(h>mx){w=Math.round(w*(mx/h));h=mx;}}
        c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
        r(c.toDataURL("image/jpeg",0.85).split(",")[1]);
      }catch(e){r(dataUrl.split(",")[1]);}};
      img.onerror=()=>r(dataUrl.split(",")[1]);img.src=dataUrl;
    }catch(e){r(dataUrl.split(",")[1]);}
  });
}

async function callAPI(b64,label){
  try{
    const r=await fetch("/api/analyze",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({image_base64:b64,position_label:label})});
    if(!r.ok){const t=await r.text().catch(()=>"");return{qualidade:"erro",motivo:`Erro ${r.status}: ${t.substring(0,120)}`,danos:[]};}
    return await r.json();
  }catch(e){return{qualidade:"erro",motivo:`Rede: ${e.message}`,danos:[]};}
}

function App(){
  const [step,setStep]=useState("intro");

  const [photos,setPhotos]=useState([]);
  const [damages,setDamages]=useState([]);
  const [mat,setMat]=useState(null);
  const [busy,setBusy]=useState(false);
  const [result,setResult]=useState(null);
  const [alerts,setAlerts]=useState([]);
  const [selZone,setSelZone]=useState(null);
  const [cuPhoto,setCuPhoto]=useState(null);
  const [showJ,setShowJ]=useState(false);
  const [rejected,setRejected]=useState([]);
  const [showParts,setShowParts]=useState(false);
  const [viewPhoto,setViewPhoto]=useState(null);
  const [mainDone,setMainDone]=useState(false);
  const fRef=useRef(null);

  const goHome=()=>{
    if(photos.length>0){try{if(!window.confirm("Voltar ao início apaga a inspeção. Continuar?"))return;}catch(e){}}
    setStep("intro");setIdx(0);setPhotos([]);setDamages([]);setMat(null);setBusy(false);setResult(null);setAlerts([]);setCuPhoto(null);setRejected([]);setShowJ(false);setShowParts(false);setViewPhoto(null);setMainDone(false);
  };

  const onUpload=useCallback(async(e)=>{
    const f=e.target.files?.[0];if(!f)return;setBusy(true);setResult(null);
    const rd=new FileReader();
    rd.onload=async(ev)=>{
      try{
        const full=ev.target.result;
        const b64=await compress(full);
        const pos=cuPhoto||POS[idx];
        const ph={id:Date.now(),position:pos,preview:full,isCloseup:!!cuPhoto};
        setPhotos(p=>[...p,ph]);
        const res=await callAPI(b64,pos.label);
        setResult(res);
        if(res.qualidade==="rejeitada"||res.qualidade==="erro"){setBusy(false);return;}
        if(res.matricula?.confianca>50)setMat(p=>(!p||res.matricula.confianca>p.confianca)?res.matricula:p);
        if(res.danos?.length)setDamages(p=>[...p,...res.danos.map((d,i)=>({...d,id:`${Date.now()}-${i}`,photoId:ph.id,rejected:false,fotoLabel:pos.label}))]);
        if(res.condicoes_adversas?.length)setAlerts(p=>[...p,...res.condicoes_adversas.map(c=>`${pos.label}: ${c}`)]);
        setBusy(false);
      }catch(err){setResult({qualidade:"erro",motivo:`${err.message}`,danos:[]});setBusy(false);}
    };rd.readAsDataURL(f);if(fRef.current)fRef.current.value="";
  },[idx,cuPhoto]);

  const confirm=()=>{
    setResult(null);

    if(idx<POS.length-1){setIdx(p=>p+1);}

        {[{n:"1",t:"Uma volta completa",d:"13 fotos num percurso contínuo"},{n:"2",t:"Jantes incluídas",d:"Close-ups integrados no percurso"},{n:"3",t:"Revisão IA",d:"Confirme, rejeite ou peça close-up"},{n:"4",t:"Relatório JSON",d:"Exportação para o seu sistema"}].map((s,i)=>(
          <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"8px 0",borderTop:i?"1px solid #E2E8F0":"none"}}>
            <div style={{width:28,height:28,borderRadius:8,background:"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#FFF",flexShrink:0}}>{s.n}</div>
            <div><div style={{fontWeight:700,fontSize:13}}>{s.t}</div><div style={{fontSize:12,color:"#64748B",marginTop:2}}>{s.d}</div></div>
          </div>
        ))}
      </div>
      <div style={{...S.crd,background:"#EFF6FF",border:"1px solid #BFDBFE"}}>
        <h3 style={{fontSize:13,fontWeight:700,color:"#2563EB",margin:"0 0 8px"}}>💡 Dicas</h3>
        <div style={{fontSize:12,color:"#1D4ED8",lineHeight:1.8}}>Carro limpo e seco • Fotografar à sombra • ~2m exteriores • ~50cm jantes</div>
      </div>
      <button style={{...S.btn("primary"),width:"100%",padding:"14px",fontSize:16}} onClick={()=>setStep("capturing")}>Iniciar Inspeção →</button>
    </div></div>
  );

  // ═══ CAPTURING ═══
  if(step==="capturing"){
    const pos=cuPhoto||POS[idx];const last=photos[photos.length-1];const pDmg=damages.filter(d=>d.photoId===last?.id);
    return(
      <div style={S.app}>
        <div style={S.hdr}><button style={S.back} onClick={goHome}>← Início</button><img src={LOGO} alt="" style={{height:28}}/><span style={{fontSize:12,color:"#64748B",minWidth:60,textAlign:"right"}}>{cuPhoto?"Close-up":`${idx+1}/${POS.length}`}</span></div>
        <div style={S.cnt}>
          {!cuPhoto&&<div style={{background:"#E2E8F0",borderRadius:10,height:5,marginBottom:14,overflow:"hidden"}}><div style={{background:"#2563EB",height:"100%",borderRadius:10,width:`${((mainDone?POS.length:idx)/POS.length)*100}%`,transition:"width 0.5s"}}/></div>}

          {!cuPhoto&&!busy&&(!result||result.qualidade==="erro"||result.qualidade==="rejeitada")&&(
            <div style={{...S.crd,padding:"12px 8px",textAlign:"center"}}>
              <CarSVG markers={true} ci={idx} cc={mainDone?POS.length:idx}/>
              <div style={{marginTop:12,padding:"10px 14px",background:"#FFF",borderRadius:10,border:"1px solid #E2E8F0"}}>
                <div style={{fontSize:18,fontWeight:800,marginBottom:2}}>{pos.icon} {pos.label}</div>
                <div style={{fontSize:12,color:"#2563EB",marginBottom:4,fontWeight:600}}>{pos.angle!=="-"?`Ângulo: ${pos.angle}`:pos.type==="teto"?"Vista superior":"Close-up ~50cm"}</div>
                <div style={{fontSize:13,color:"#64748B",lineHeight:1.4}}>{pos.inst}</div>
              </div>
            </div>
          )}

          {cuPhoto&&!busy&&(!result||result.qualidade==="erro"||result.qualidade==="rejeitada")&&(
            <div style={{...S.crd,textAlign:"center",padding:20}}>
              <div style={{fontSize:36,marginBottom:6}}>🔍</div>
              <h2 style={{fontSize:16,fontWeight:800,margin:"0 0 4px"}}>{pos.label}</h2>
              <p style={{fontSize:13,color:"#64748B",margin:0}}>{pos.inst}</p>
            </div>
          )}

          {!busy&&(!result||result.qualidade==="rejeitada"||result.qualidade==="erro")&&(
            <div style={{marginBottom:14}}>
              <input ref={fRef} type="file" accept="image/*" capture="environment" onChange={onUpload} style={{display:"none"}}/>
              <button style={{...S.btn("primary"),width:"100%",padding:14,fontSize:15}} onClick={()=>fRef.current?.click()}>📸 Tirar Foto</button>
              {/* Manual close-up button */}
              <button style={{...S.btn("secondary"),width:"100%",padding:10,fontSize:12,marginTop:8}} onClick={()=>setShowParts(!showParts)}>
                🔍 {showParts?"Fechar lista":"Close-up manual de uma peça"}
              </button>
              {showParts&&(
                <div style={{...S.crd,marginTop:8,padding:12,maxHeight:250,overflowY:"auto"}}>
                  <p style={{fontSize:11,color:"#64748B",marginBottom:8}}>Seleccione a peça para fotografar em close-up:</p>
                  {PARTS.map((p,i)=>(
                    <button key={i} onClick={()=>startCloseup(p)} style={{display:"block",width:"100%",textAlign:"left",padding:"8px 10px",background:i%2?"#F8FAFC":"#FFF",border:"none",borderBottom:"1px solid #F1F5F9",fontSize:12,color:"#1E293B",cursor:"pointer"}}>📷 {p}</button>
                  ))}
                </div>
              )}
            </div>
          )}

          {busy&&(<div style={{...S.crd,textAlign:"center",padding:30}}><div style={{fontSize:32,marginBottom:12,animation:"sp 1s linear infinite"}}>🔍</div><p style={{fontSize:14,color:"#2563EB",fontWeight:600,margin:"0 0 4px"}}>A analisar...</p><p style={{fontSize:12,color:"#64748B",margin:0}}>Aguarde 5-10 segundos</p></div>)}

          {result?.qualidade==="rejeitada"&&(<div style={{...S.crd,background:"#FEF2F2",border:"1px solid #FECACA"}}><h3 style={{color:"#DC2626",fontSize:14,margin:"0 0 6px"}}>⚠️ Foto Rejeitada</h3><p style={{fontSize:13,color:"#DC2626",margin:"0 0 8px"}}>{result.motivo}</p>{result.instrucao&&<p style={{fontSize:12,color:"#64748B",margin:"0 0 12px"}}>💡 {result.instrucao}</p>}<button style={{...S.btn("secondary"),width:"100%",fontSize:12}} onClick={()=>{setPhotos(p=>p.slice(0,-1));setResult(null);}}>Dispensar e tirar nova foto</button></div>)}

          {result?.qualidade==="erro"&&(<div style={{...S.crd,background:"#FEF2F2",border:"1px solid #FECACA"}}><h3 style={{color:"#DC2626",fontSize:14,margin:"0 0 6px"}}>❌ Erro</h3><p style={{fontSize:12,color:"#DC2626",margin:"0 0 12px",wordBreak:"break-all",maxHeight:80,overflow:"auto"}}>{result.motivo}</p><button style={{...S.btn("secondary"),width:"100%",fontSize:12}} onClick={()=>{setPhotos(p=>p.slice(0,-1));setResult(null);}}>Dispensar e tentar novamente</button></div>)}

          {result?.qualidade==="aceite"&&!busy&&(<>
            {last&&(<div style={{...S.crd,padding:0,overflow:"hidden",position:"relative"}}><img src={last.preview} alt="" style={{width:"100%",display:"block",borderRadius:"16px 16px 0 0"}}/>{pDmg.filter(d=>d.posicao_x&&d.posicao_y&&!d.rejected).map((d,i)=>{const sv=SEV[d.gravidade];return(<div key={i} style={{position:"absolute",left:`${d.posicao_x}%`,top:`${d.posicao_y}%`,transform:"translate(-50%,-50%)",width:28,height:28,borderRadius:"50%",border:`3px solid ${sv.border}`,background:`${sv.border}55`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#FFF",fontWeight:800}}>{i+1}</div>);})}<div style={{padding:"10px 16px",background:"#F8FAFC"}}><span style={{fontSize:12,color:pDmg.length?"#EA580C":"#16A34A",fontWeight:600}}>{pDmg.length?`${pDmg.length} dano(s) detectado(s)`:"✓ Sem danos"}</span></div></div>)}
            {pDmg.length>0&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>{pDmg.map(d=><DamageCard key={d.id} d={d} onReject={rej} onRestore={rest}/>)}</div>}
            {result.matricula&&(<div style={{...S.crd,display:"flex",alignItems:"center",gap:10,padding:"12px 16px"}}><span style={{fontSize:20}}>🔢</span><span style={{fontWeight:800,fontSize:16,fontFamily:"monospace"}}>{result.matricula.valor}</span><span style={{fontSize:11,color:"#64748B"}}>({result.matricula.confianca}%)</span></div>)}
            {result.zonas_duvida?.length>0&&(<div style={{...S.crd,background:"#EFF6FF",border:"1px solid #BFDBFE"}}><h4 style={{fontSize:13,color:"#2563EB",margin:"0 0 8px"}}>🔍 Close-up recomendado</h4>{result.zonas_duvida.map((z,i)=>(<button key={i} onClick={()=>startCloseup(z)} style={{...S.btn("secondary"),width:"100%",marginBottom:4,textAlign:"left",fontSize:12}}>📷 {z}</button>))}</div>)}
            <div style={{display:"flex",gap:8}}><button style={{...S.btn("secondary"),flex:1}} onClick={retake}>Repetir</button><button style={{...S.btn("primary"),flex:2}} onClick={confirm}>{idx<POS.length-1&&!cuPhoto?"Confirmar → Próxima":"Finalizar ✓"}</button></div>
          </>)}

          {!busy&&(!result||result.qualidade==="erro"||result.qualidade==="rejeitada")&&(
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {mat&&<div style={{...S.crd,flex:1,display:"flex",alignItems:"center",gap:8,padding:"10px 14px",minWidth:130}}><span>🔢</span><span style={{fontWeight:700,fontSize:13,fontFamily:"monospace"}}>{mat.valor}</span></div>}
              {damages.filter(d=>!d.rejected).length>0&&<div style={{...S.crd,flex:1,display:"flex",alignItems:"center",gap:8,padding:"10px 14px",minWidth:130}}><span>⚠️</span><span style={{fontSize:13,color:"#EA580C",fontWeight:600}}>{damages.filter(d=>!d.rejected).length} dano(s)</span></div>}
            </div>
          )}
          {photos.length>=6&&!busy&&(!result||result.qualidade==="erro"||result.qualidade==="rejeitada")&&!cuPhoto&&<button style={{...S.btn("secondary"),width:"100%",fontSize:12,marginTop:4}} onClick={()=>{setMainDone(true);setStep("review");}}>Terminar e ir para revisão →</button>}
        </div>
      </div>
    );
  }

  // ═══ REPORT ═══
  const actDmg=damages.filter(d=>!d.rejected);const rpt=report();
  return(
    <div style={S.app}>
      <div style={S.hdr}><button style={S.back} onClick={goHome}>← Início</button><img src={LOGO} alt="" style={{height:28}}/><button style={{...S.btn("secondary"),padding:"5px 10px",fontSize:11}} onClick={()=>{setStep("capturing");setResult(null);}}>+ Fotos</button></div>
      <div style={S.cnt}>
        <div style={S.crd}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
            <div><h2 style={{fontSize:20,fontWeight:800,margin:0}}>Relatório</h2>{mat&&<span style={{fontSize:16,fontWeight:700,fontFamily:"monospace",color:"#2563EB"}}>{mat.valor}</span>}</div>
            <div style={{textAlign:"right"}}><div style={{fontSize:11,color:"#64748B"}}>{photos.length} fotos</div><div style={{fontSize:11,color:"#64748B"}}>{new Date().toLocaleDateString("pt-PT")}</div></div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
            <div style={{...S.bdg,background:actDmg.length?"#DC2626":"#16A34A",color:"#FFF"}}>{actDmg.length} dano(s)</div>
            <div style={{...S.bdg,background:"#2563EB",color:"#FFF"}}>Confiança: {rpt.veiculo.confianca_geral}%</div>
            {rejected.length>0&&<div style={{...S.bdg,background:"#CBD5E1",color:"#475569"}}>{rejected.length} rejeitado(s)</div>}
          </div>
        </div>

        {/* Photo gallery */}
        {photos.length>0&&(
          <div style={S.crd}>
            <h3 style={{fontSize:13,fontWeight:700,color:"#64748B",margin:"0 0 10px",textTransform:"uppercase",letterSpacing:1}}>Fotos ({photos.length})</h3>
            <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8}}>
              {photos.map(ph=><PhotoThumb key={ph.id} photo={ph} damages={damages} onClick={()=>setViewPhoto(ph)}/>)}
            </div>
            <p style={{fontSize:10,color:"#94A3B8",marginTop:6}}>Toque numa foto para ver em tamanho completo com danos marcados</p>
          </div>
        )}

        <div style={S.crd}><h3 style={{fontSize:13,fontWeight:700,color:"#64748B",margin:"0 0 12px",textTransform:"uppercase",letterSpacing:1}}>Mapa de Danos</h3><ReportDiagram damages={damages} selZone={selZone} onZoneClick={setSelZone}/><div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginTop:12}}>{Object.entries(SEV).map(([k,v])=>(<div key={k} style={{display:"flex",alignItems:"center",gap:4,fontSize:10}}><div style={{width:10,height:10,borderRadius:3,background:v.border}}/><span style={{color:"#64748B"}}>{v.label}</span></div>))}</div></div>

        {damages.length>0&&<div style={S.crd}><h3 style={{fontSize:13,fontWeight:700,color:"#64748B",margin:"0 0 12px",textTransform:"uppercase",letterSpacing:1}}>Danos ({actDmg.length})</h3><div style={{display:"flex",flexDirection:"column",gap:8}}>{damages.map(d=><DamageCard key={d.id} d={d} onReject={rej} onRestore={rest}/>)}</div></div>}
        {actDmg.length===0&&<div style={{...S.crd,textAlign:"center",padding:30}}><div style={{fontSize:40,marginBottom:8}}>✅</div><h3 style={{color:"#16A34A",margin:"0 0 4px"}}>Sem danos</h3></div>}

        {alerts.length>0&&<div style={{...S.crd,background:"#FEF2F2",border:"1px solid #FECACA"}}><h3 style={{fontSize:13,fontWeight:700,color:"#DC2626",margin:"0 0 8px"}}>⚠️ Alertas</h3>{[...new Set(alerts)].map((a,i)=><div key={i} style={{fontSize:12,color:"#DC2626",padding:"3px 0"}}>• {a}</div>)}</div>}

        {/* Manual close-up from report */}
        <div style={S.crd}>
          <h3 style={{fontSize:13,fontWeight:700,color:"#64748B",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:1}}>Close-up Adicional</h3>
          <p style={{fontSize:12,color:"#64748B",marginBottom:10}}>Tire close-up de qualquer peça para melhorar a análise:</p>
          <button style={{...S.btn("primary"),width:"100%",fontSize:13,padding:10}} onClick={()=>setShowParts(!showParts)}>🔍 {showParts?"Fechar":"Escolher peça para close-up"}</button>
          {showParts&&(
            <div style={{marginTop:8,maxHeight:200,overflowY:"auto",border:"1px solid #E2E8F0",borderRadius:8}}>
              {PARTS.map((p,i)=>(
                <button key={i} onClick={()=>startCloseup(p)} style={{display:"block",width:"100%",textAlign:"left",padding:"8px 10px",background:i%2?"#F8FAFC":"#FFF",border:"none",borderBottom:"1px solid #F1F5F9",fontSize:12,cursor:"pointer"}}>📷 {p}</button>
              ))}
            </div>
          )}
        </div>

        <div style={S.crd}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showJ?12:0}}><h3 style={{fontSize:13,fontWeight:700,color:"#64748B",margin:0,textTransform:"uppercase",letterSpacing:1}}>JSON</h3><button style={{...S.btn("secondary"),padding:"4px 12px",fontSize:11}} onClick={()=>setShowJ(!showJ)}>{showJ?"Esconder":"Ver"}</button></div>{showJ&&<pre style={{background:"#F1F5F9",border:"1px solid #E2E8F0",borderRadius:8,padding:12,fontSize:10,overflow:"auto",maxHeight:350,lineHeight:1.4,fontFamily:"monospace"}}>{JSON.stringify(rpt,null,2)}</pre>}</div>
        <div style={{display:"flex",gap:8}}><button style={{...S.btn("primary"),flex:1,padding:14,fontSize:15}} onClick={dlJson}>📥 Exportar JSON</button><button style={{...S.btn("secondary"),padding:"14px 20px"}} onClick={()=>navigator.clipboard?.writeText(JSON.stringify(rpt,null,2))}>📋</button></div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
